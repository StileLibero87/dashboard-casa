<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Casa</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
      }

      /* Wrapper scrollabile */
      .scroll-wrapper {
        width: 100vw;
        height: 100vh;
        overflow-x: auto;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch; /* scroll fluido su Android/iOS */
      }

      /* Iframe più largo dello schermo */
      iframe {
        border: 0;
        width: 1600px;   /* puoi aumentare se vuoi più spazio */
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="scroll-wrapper">
      <iframe 
        src="https://datastudio.google.com/embed/reporting/349a8d8b-2fe7-4d5d-a595-ce0507f35ee0/page/p_hcjpdx5m4d">
      </iframe>
    </div>
  </body>
</html>
